<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Infinite Ambient — a rack of listening instruments</title>
    <meta
      name="description"
      content="An endless generative ambient rack. A shared key seeds every instrument; they listen to each other over timing, pitch, and timbre. Microtonal, interval-based, and it never repeats. Runs entirely in your browser."
    />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <canvas id="bg" aria-hidden="true"></canvas>

    <header class="topbar">
      <div class="brand">
        <h1>Infinite&nbsp;Ambient</h1>
        <p class="tagline">A key unlocks the ensemble. The instruments listen to each other.</p>
      </div>

      <div class="transport">
        <button id="playAll" class="play" aria-pressed="false" aria-label="Play or pause the ensemble">
          <span class="glyph" aria-hidden="true"></span>
          <span class="label">Play</span>
        </button>
      </div>

      <div class="key-block">
        <div class="key-row">
          <input
            id="keyInput"
            class="key-input"
            type="text"
            spellcheck="false"
            autocomplete="off"
            aria-label="Key — seeds the whole ensemble"
          />
          <button id="keyApply" class="key-btn" title="Unlock this key">unlock</button>
          <button id="keyNew" class="key-btn" title="Generate a new key">🎲</button>
          <button id="keyCopy" class="key-btn" title="Copy the key to share">copy</button>
        </div>
        <div id="keyChips" class="chips"></div>
      </div>

      <div class="globals">
        <label class="mini">Pace <input id="pace" type="range" min="0" max="1" step="0.01" /></label>
        <label class="mini">Volume <input id="volume" type="range" min="0" max="1" step="0.01" value="0.85" /></label>
        <div class="add-wrap">
          <button id="addBtn" class="ghost">＋ Instrument</button>
          <div id="addMenu" class="add-menu"></div>
        </div>
      </div>
    </header>

    <main id="panes" class="panes" aria-label="Instrument panes"></main>

    <p class="footnote">
      Each pane is an instrument. They share one key and one clock, and answer each other over
      timing, pitch, and timbre. Press <kbd>space</kbd> to play / pause.
    </p>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
