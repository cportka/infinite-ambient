<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Infinite Ambient — endless generative soundscapes</title>
    <meta
      name="description"
      content="An infinite, endlessly customizable stream of generative ambient music. A key unlocks a piece — microtonal, interval-based, and it never repeats. Runs entirely in your browser."
    />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <canvas id="viz" aria-hidden="true"></canvas>

    <main class="panel" role="main">
      <header class="masthead">
        <h1>Infinite&nbsp;Ambient</h1>
        <p class="tagline">A key unlocks a piece. It never repeats.</p>
      </header>

      <button id="playBtn" class="play" aria-pressed="false" aria-label="Play or pause">
        <span class="glyph" aria-hidden="true"></span>
        <span class="label">Play</span>
      </button>

      <section class="key-section" aria-label="The key">
        <h2 class="section-title">Key</h2>
        <div class="key-row">
          <input
            id="keyInput"
            class="key-input"
            type="text"
            spellcheck="false"
            autocomplete="off"
            aria-label="Key — a string that unlocks a piece"
          />
          <button id="keyApply" class="key-btn" title="Unlock this key">unlock</button>
          <button id="keyNew" class="key-btn" title="Generate a new key">🎲</button>
          <button id="keyCopy" class="key-btn" title="Copy the key to share">copy</button>
        </div>
        <p class="key-hint">The key seeds the whole piece — share it and it recreates note-for-note.</p>
        <div id="keys" class="keys"></div>
      </section>

      <section class="controls" aria-label="Sound controls">
        <div class="control">
          <label for="motion">Motion <span class="readout" data-readout="motion"></span></label>
          <input id="motion" type="range" min="0" max="1" step="0.01" />
        </div>
        <div class="control">
          <label for="shimmer">Shimmer <span class="readout" data-readout="shimmer"></span></label>
          <input id="shimmer" type="range" min="0" max="1" step="0.01" />
        </div>
        <div class="control">
          <label for="brightness">Brightness <span class="readout" data-readout="brightness"></span></label>
          <input id="brightness" type="range" min="0" max="1" step="0.01" />
        </div>
        <div class="control">
          <label for="space">Space <span class="readout" data-readout="space"></span></label>
          <input id="space" type="range" min="0" max="1" step="0.01" />
        </div>
        <div class="control">
          <label for="pace">Pace <span class="readout" data-readout="pace"></span></label>
          <input id="pace" type="range" min="0" max="1" step="0.01" />
        </div>
        <div class="control">
          <label for="volume">Volume <span class="readout" data-readout="volume"></span></label>
          <input id="volume" type="range" min="0" max="1" step="0.01" />
        </div>
      </section>

      <footer class="foot">
        <span class="hint">Press <kbd>space</kbd> to play / pause</span>
      </footer>
    </main>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
